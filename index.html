    <div class="post-summary">
      <h2 id="背景">背景</h2>

<p>我用 <a href="https://github.com/junegunn/vim-plug">vim-plug</a> 来管理 Vim 插件，该插件提供了两个命令用来更新它所管理的的插件。为了保持插件最新，一开始我每天手动执行一次更新命令，后来想到应该有什么方法可以让 Vim 每天自动执行这两个命令。
</p>
